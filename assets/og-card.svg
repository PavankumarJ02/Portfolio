      <stop offset="0%" stop-color="#f7f4ee" />
      <stop offset="100%" stop-color="#e9e2d6" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#111827" />
      <stop offset="100%" stop-color="#2563eb" />
    </linearGradient>
    <filter id="blur">
